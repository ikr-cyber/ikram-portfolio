<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ikram Portfolio</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0d0d1a;
  color:white;
  overflow-x:hidden;
}

/* النجوم */
#stars{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* الاسم */
.name{
  font-family:'Pacifico';
  font-size:70px;
  color:#ff4d88;
  text-align:center;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #ff4d88; }
  to{ text-shadow:0 0 30px #ff99bb; }
}

/* الصفحة */
.home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.typing{
  color:#a855f7;
  border-right:2px solid #a855f7;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typing 4s steps(30) infinite alternate;
}

@keyframes typing{
  from{ width:0; }
  to{ width:320px; }
}

/* الأزرار */
.cards{
  display:flex;
  gap:20px;
  margin-top:30px;
}

.card{
  padding:15px 25px;
  border-radius:20px;
  background:#ff4d88;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.1);
}

/* أيقونات التواصل */
.social{
  margin-top:30px;
}

.social i{
  border:2px solid #ff4d88;
  border-radius:50%;
  padding:10px;
  margin:5px;
  cursor:pointer;
}

/* القائمة */
.menu{
  position:fixed;
  right:20px;
  top:100px;
  background:#1a1a2e;
  border-radius:20px;
  padding:10px;
}

.menu div{
  padding:15px;
  color:#aaa;
}

.menu div:hover{
  color:#ff4d88;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="menu">
  <div><i class="fas fa-home"></i> Accueil</div>
  <div><i class="fas fa-user"></i> À propos</div>
  <div><i class="fas fa-laptop-code"></i> Compétences</div>
  <div><i class="fas fa-folder"></i> Projets</div>
  <div><i class="fas fa-graduation-cap"></i> Formation</div>
  <div><i class="fas fa-star"></i> Témoignages</div>
  <div><i class="fas fa-envelope"></i> Contact</div>
</div>

<section class="home">
  <h3>Bonjour je suis</h3>

  <h1 class="name">Belhadjer Ikram</h1>

  ✨

  <div class="typing">
    Étudiante en gestion des systèmes réseau
  </div>

  <p>
    Passionnée par la cybersécurité et l'administration réseau,
    je conçois des solutions sécurisées et innovantes.
  </p>

  <div class="cards">
    <div class="card"><i class="fas fa-shield-alt"></i> Cybersécurité</div>
    <div class="card"><i class="fas fa-network-wired"></i> Réseau</div>
    <div class="card"><i class="fas fa-code"></i> Développement</div>
  </div>

  <div class="social">
    <i class="fab fa-linkedin"></i>
    <i class="fab fa-github"></i>
    <i class="fas fa-envelope"></i>
    <i class="fas fa-phone"></i>
  </div>

</section>

<script>
// النجوم
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<100;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    s: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  stars.forEach(star=>{
    ctx.beginPath();
    ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
    ctx.fill();

    star.y += star.s;
    if(star.y > canvas.height) star.y=0;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
