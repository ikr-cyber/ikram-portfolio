<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio Ikram</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f8f8f8;
}

/* ===== SIDEBAR ===== */
.sidebar {
    position: fixed;
    right: 20px;
    top: 30%;
    background: white;
    padding: 10px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.sidebar a {
    display: block;
    text-align: center;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    color: #777;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #ff5ca8;
    color: white;
}

/* ===== INTRO ===== */
.intro {
    text-align: center;
    padding: 100px 20px;
}

/* Avatar */
.avatar {
    width: 160px;
    height: 160px;
    margin: auto;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff5ca8, #ff8ecf);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    color: white;
    position: relative;
    box-shadow: 0 10px 30px rgba(255, 92, 168, 0.4);
    animation: pulse 2s infinite;
}

.status {
    position: absolute;
    bottom: -10px;
    background: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.dot {
    width: 8px;
    height: 8px;
    background: green;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
}

/* Text */
.hello {
    margin-top: 30px;
    color: gray;
}

.name {
    font-size: 60px;
    color: #ff5ca8;
    font-weight: bold;
    letter-spacing: 3px;
}

.stars {
    font-size: 25px;
    margin-top: 10px;
    animation: float 2s infinite alternate;
}

/* Animations */
@keyframes pulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.05); }
}

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
}

</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <a href="#"><i class="fa fa-home"></i></a>
    <a href="#"><i class="fa fa-user"></i></a>
    <a href="#"><i class="fa fa-code"></i></a>
    <a href="#"><i class="fa fa-folder"></i></a>
    <a href="#"><i class="fa fa-graduation-cap"></i></a>
    <a href="#"><i class="fa fa-envelope"></i></a>
</div>

<!-- ===== INTRO ===== -->
<div class="intro">

    <div class="avatar">
        <i class="fa fa-user-shield"></i>

        <div class="status">
            <span class="dot"></span> Disponible
        </div>
    </div>

    <p class="hello">Bonjour, je suis</p>

    <h1 class="name">IKRAM</h1>

    <div class="stars">✨</div>

</div>

</body>
</html>
