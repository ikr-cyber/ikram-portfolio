<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ikram Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0d0d1a;
  color:white;
  transition:0.5s;
}

body.light{
  background:#f5f5f5;
  color:black;
}

#themeToggle{
  position:fixed;
  top:20px;
  left:20px;
  background:#ff4d88;
  border:none;
  border-radius:50%;
  padding:10px;
  cursor:pointer;
  z-index:999;
}

#stars{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.name{
  font-family:'Pacifico';
  font-size:70px;
  color:#ff4d88;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #ff4d88; }
  to{ text-shadow:0 0 30px #ff99bb; }
}

.typing{
  color:#a855f7;
  border-right:2px solid #a855f7;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typing 4s steps(40) infinite alternate;
}

@keyframes typing{
  from{ width:0; }
  to{ width:420px; }
}

/* الدوائر */
.stats{
  display:flex;
  gap:30px;
  margin-top:30px;
}

.stat{
  background:#1a1a2e;
  padding:20px;
  border-radius:20px;
  text-align:center;
  width:120px;
}

.stat h2{
  color:#ff4d88;
}

/* الأزرار */
.buttons{
  margin-top:30px;
}

.btn{
  padding:15px 25px;
  border-radius:30px;
  margin:10px;
  cursor:pointer;
  border:none;
}

.btn-main{
  background:#ff4d88;
  color:white;
}

.btn-outline{
  background:transparent;
  border:2px solid #ff4d88;
  color:#ff4d88;
}

/* social */
.social i{
  border:2px solid #ff4d88;
  border-radius:50%;
  padding:10px;
  margin:5px;
}

/* scroll animation */
.hidden{
  opacity:0;
  transform:translateY(50px);
  transition:0.6s;
}

.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<button id="themeToggle">🌙</button>
<canvas id="stars"></canvas>

<section class="home">

<h3>Bonjour je suis</h3>

<h1 class="name">Belhadjer Ikram</h1>

✨

<div class="typing">
Étudiante en administration et sécurité des réseaux informatiques
</div>

<p>
Passionnée par la cybersécurité et l'administration réseau,
je conçois des solutions sécurisées et innovantes.
</p>

<!-- الدوائر -->
<div class="stats hidden">
  <div class="stat">
    <h2>3</h2>
    <p>Projets</p>
  </div>

  <div class="stat">
    <h2>4</h2>
    <p>Certifications</p>
  </div>

  <div class="stat">
    <h2>1</h2>
    <p>Prix</p>
  </div>
</div>

<!-- الأزرار -->
<div class="buttons hidden">
  <button class="btn btn-main">
    <i class="fas fa-rocket"></i> Découvrir mes projets
  </button>

  <button class="btn btn-outline">
    <i class="fas fa-envelope"></i> Me contacter
  </button>
</div>

<!-- social -->
<div class="social hidden">
  <i class="fab fa-linkedin"></i>
  <i class="fab fa-github"></i>
  <i class="fab fa-whatsapp"></i>
</div>

</section>

<script>
// theme
document.getElementById("themeToggle").onclick = () => {
  document.body.classList.toggle("light");
};

// stars
const c = document.getElementById("stars");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let stars = Array(100).fill().map(()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  r:Math.random()*2,
  s:Math.random()
}));

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="white";
  stars.forEach(st=>{
    ctx.beginPath();
    ctx.arc(st.x,st.y,st.r,0,6.28);
    ctx.fill();
    st.y+=st.s;
    if(st.y>c.height) st.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

// scroll animation
const elements = document.querySelectorAll('.hidden');

window.addEventListener('scroll', () => {
  elements.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
