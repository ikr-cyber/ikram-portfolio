<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ikram Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px;
        }

        h1 {
            font-size: 40px;
        }

        h2 {
            margin-top: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            margin: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #ff4b7d;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background: #ff4b7d;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Ikram 💖</h1>
        <p>Future Network & Cybersecurity Administrator</p>

        <div class="card">
            <h2>👩‍💻 About Me</h2>
            <p>I am Ikram, a student in networking and cybersecurity. I am passionate about protecting systems and learning new technologies.</p>
        </div>

        <div class="card">
            <h2>💪 Skills</h2>
            <ul>
                <li>Networking</li>
                <li>Cybersecurity Basics</li>
                <li>Linux</li>
            </ul>
        </div>

        <div class="card">
            <h2>📂 Projects</h2>
            <p>Coming soon...</p>
        </div>

        <a href="#" class="btn">Contact Me</a>
    </div>

</body>
</html>
